<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b3d6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Congélateur">
<title>Mon Congélateur</title>
<style>
  :root{
    --bg:#e7f0f8;
    --frost-1:#f3f9ff;
    --frost-2:#dcecfb;
    --card:#ffffff;
    --ink:#12283f;
    --muted:#5b7591;
    --line:#d6e3f0;
    --primary:#0b5cad;
    --primary-dark:#083f78;
    --primary-soft:#e4f0fb;

    --fresh:#1f8a4c;      --fresh-bg:#e3f6ea;
    --soon:#b7791a;       --soon-bg:#fbf1da;
    --urgent:#c85410;     --urgent-bg:#fce7d8;
    --expired:#c62b2b;    --expired-bg:#fbe0e0;

    --shadow-sm:0 1px 2px rgba(11,60,107,.06), 0 1px 3px rgba(11,60,107,.08);
    --shadow-md:0 6px 18px rgba(11,60,107,.10), 0 2px 6px rgba(11,60,107,.08);
    --radius:16px;
    --radius-sm:11px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 15% -10%, var(--frost-1), transparent 60%),
      radial-gradient(1000px 600px at 110% 10%, var(--frost-2), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    font-size:16px;
    line-height:1.45;
  }

  .app{max-width:720px;margin:0 auto;padding:0 16px 108px;}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:30;
    margin:0 -16px 4px;padding:16px 16px 12px;
    background:linear-gradient(180deg, rgba(231,240,248,.96), rgba(231,240,248,.82));
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .flake{
    font-size:26px;line-height:1;filter:drop-shadow(0 1px 1px rgba(11,60,107,.25));
  }
  .brand h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.3px;}
  .brand .sub{font-size:12.5px;color:var(--muted);margin-top:1px;font-weight:500;}
  .summary{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--card);border:1px solid var(--line);
    padding:6px 11px;border-radius:999px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow-sm);
  }
  .pill b{font-weight:800;}
  .pill.warn{background:var(--soon-bg);border-color:#efd9a6;color:#7a5410;}
  .pill.bad{background:var(--expired-bg);border-color:#f2bcbc;color:#8f2020;}
  .pill.ok{background:var(--fresh-bg);border-color:#bfe6cd;color:#166534;}

  /* ---------- Alert banner ---------- */
  .banner{
    display:flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid #f0cf9c;
    border-left:5px solid var(--soon);
    padding:13px 14px;border-radius:var(--radius-sm);
    box-shadow:var(--shadow-sm);margin:14px 0;cursor:pointer;
  }
  .banner.bad{border-color:#f0b3b3;border-left-color:var(--expired);}
  .banner .icon{font-size:22px;}
  .banner .txt{flex:1;font-size:14px;line-height:1.3;}
  .banner .txt b{font-weight:800;}
  .banner .go{color:var(--muted);font-size:20px;}

  /* ---------- Filters ---------- */
  .toolbar{margin:14px 0 4px;}
  .search{position:relative;margin-bottom:10px;}
  .search input{
    width:100%;padding:13px 42px 13px 42px;
    border:1px solid var(--line);border-radius:var(--radius-sm);
    background:var(--card);font-size:16px;color:var(--ink);
    box-shadow:var(--shadow-sm);
  }
  .search .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
  .search .clr{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    border:none;background:var(--primary-soft);color:var(--primary);
    width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;display:none;
  }
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    color:var(--muted);padding:8px 13px;border-radius:999px;font-size:13.5px;
    font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow-sm);
  }
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .chip .n{opacity:.85;font-weight:700;margin-left:2px;}
  .sortrow{display:flex;align-items:center;justify-content:space-between;margin:12px 2px 4px;}
  .sortrow .count{font-size:13px;color:var(--muted);font-weight:600;}
  .sortrow select{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:7px 10px;border-radius:9px;font-size:13.5px;font-weight:600;
  }

  /* ---------- Cards ---------- */
  .list{display:grid;grid-template-columns:1fr;gap:11px;margin-top:8px;}
  @media(min-width:560px){.list{grid-template-columns:1fr 1fr;}}
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);
    border-left:5px solid var(--line);position:relative;
    display:flex;flex-direction:column;gap:9px;
  }
  .card.s-fresh{border-left-color:var(--fresh);}
  .card.s-soon{border-left-color:var(--soon);}
  .card.s-urgent{border-left-color:var(--urgent);}
  .card.s-expired{border-left-color:var(--expired);background:#fffafa;}
  .card .top{display:flex;align-items:flex-start;gap:10px;}
  .card .emoji{font-size:24px;line-height:1;margin-top:1px;}
  .card .name{font-weight:800;font-size:16.5px;letter-spacing:-.2px;flex:1;word-break:break-word;}
  .card .qty{font-size:12.5px;color:var(--muted);font-weight:600;background:var(--frost-2);
    padding:2px 8px;border-radius:999px;white-space:nowrap;}
  .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
  .tag{font-size:12.5px;color:var(--muted);background:var(--frost-1);border:1px solid var(--line);
    padding:3px 9px;border-radius:999px;font-weight:600;display:inline-flex;gap:5px;align-items:center;}
  .status{font-size:12.5px;font-weight:800;padding:3px 10px;border-radius:999px;display:inline-flex;gap:5px;align-items:center;}
  .status.s-fresh{color:var(--fresh);background:var(--fresh-bg);}
  .status.s-soon{color:var(--soon);background:var(--soon-bg);}
  .status.s-urgent{color:var(--urgent);background:var(--urgent-bg);}
  .status.s-expired{color:var(--expired);background:var(--expired-bg);}
  .card .note{font-size:13px;color:var(--muted);font-style:italic;}
  .card .acts{display:flex;gap:8px;margin-top:2px;}
  .card .acts button{
    flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:9px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .card .acts .out{background:var(--primary);border-color:var(--primary);color:#fff;}
  .card .acts button:active{transform:scale(.98);}

  /* ---------- Empty ---------- */
  .empty{
    text-align:center;padding:46px 20px;color:var(--muted);
    background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
    margin-top:10px;
  }
  .empty .big{font-size:44px;margin-bottom:8px;}
  .empty h3{margin:0 0 6px;color:var(--ink);font-size:17px;}
  .empty p{margin:0 0 16px;font-size:14px;}

  /* ---------- Form ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);padding:18px;margin-top:8px;}
  .panel h2{margin:0 0 4px;font-size:19px;letter-spacing:-.3px;}
  .panel .lead{margin:0 0 16px;color:var(--muted);font-size:13.5px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13.5px;font-weight:700;margin-bottom:6px;}
  .field .hint{font-weight:500;color:var(--muted);font-size:12.5px;margin-left:4px;}
  .field input, .field select, .field textarea{
    width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;
    background:#fff;font-size:16px;color:var(--ink);font-family:inherit;
  }
  .field textarea{min-height:64px;resize:vertical;}
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(11,92,173,.14);
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .keepnote{background:var(--primary-soft);border:1px solid #c6def4;border-radius:11px;
    padding:11px 12px;font-size:13px;color:var(--primary-dark);margin-bottom:15px;display:flex;gap:9px;}
  .keepnote b{font-weight:800;}
  .formbtns{display:flex;gap:10px;margin-top:6px;}
  .btn{border:none;border-radius:12px;padding:14px;font-size:15.5px;font-weight:800;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn.primary{flex:1;background:var(--primary);color:#fff;box-shadow:var(--shadow-md);}
  .btn.primary:active{transform:translateY(1px);}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--muted);}
  .btn.danger{background:var(--expired-bg);color:#8f2020;border:1px solid #f0b3b3;}

  /* ---------- Drawers view ---------- */
  .freezer{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);padding:16px;margin-top:14px;}
  .freezer .fhead{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .freezer .fhead .fi{font-size:22px;}
  .freezer .fhead h3{margin:0;font-size:16.5px;}
  .freezer .fhead .fc{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:700;
    background:var(--frost-2);padding:3px 10px;border-radius:999px;}
  .drawers{display:flex;flex-direction:column;gap:9px;margin-top:12px;}
  .drawer{border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .drawer .dh{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--frost-1);
    font-weight:800;font-size:14px;cursor:pointer;}
  .drawer .dh .dn{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700;}
  .drawer .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .drawer .ditems{padding:4px 12px 10px;display:flex;flex-direction:column;gap:6px;}
  .drawer .ditems .di{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:#fff;cursor:pointer;font-size:14px;}
  .drawer .ditems .di .dname{flex:1;font-weight:600;}
  .drawer .ditems .di .ddate{font-size:12px;color:var(--muted);font-weight:600;}
  .drawer .ditems .di:active{background:var(--frost-1);}
  .drawer .vide{padding:9px 12px 12px;color:var(--muted);font-size:13px;font-style:italic;}
  .dot.s-fresh{background:var(--fresh);}.dot.s-soon{background:var(--soon);}
  .dot.s-urgent{background:var(--urgent);}.dot.s-expired{background:var(--expired);}

  /* ---------- Backup view ---------- */
  .info{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);padding:18px;margin-top:14px;}
  .info h2{margin:0 0 10px;font-size:18px;}
  .info p{font-size:14px;color:var(--muted);margin:0 0 14px;line-height:1.5;}
  .info .step{display:flex;gap:11px;margin-bottom:12px;font-size:14px;}
  .info .step .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
  .info .actions{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .stat{display:flex;justify-content:space-between;font-size:13.5px;padding:8px 0;border-bottom:1px solid var(--line);}
  .stat:last-child{border-bottom:none;}
  .stat b{font-weight:800;}

  /* ---------- Bottom nav ---------- */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,255,255,.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  nav .navbtn{
    flex:1;border:none;background:none;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 2px;border-radius:12px;cursor:pointer;font-size:10px;font-weight:700;
  }
  nav .navbtn .ni{font-size:20px;line-height:1;}
  nav .navbtn.active{color:var(--primary);}
  nav .navbtn.active .ni{transform:translateY(-1px);}
  nav .navbtn.add{color:#fff;}
  nav .navbtn.add .ni{
    background:var(--primary);width:46px;height:34px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);
    color:#fff;font-size:24px;margin-bottom:1px;
  }
  nav .navbtn.add{color:var(--primary);}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;
    font-size:14px;font-weight:600;box-shadow:var(--shadow-md);z-index:60;
    display:flex;align-items:center;gap:12px;opacity:0;pointer-events:none;
    transition:opacity .22s, transform .22s;max-width:calc(100% - 32px);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .toast button{background:rgba(255,255,255,.2);border:none;color:#fff;font-weight:800;
    padding:6px 11px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;}

  /* ---------- Gérer les aliments ---------- */
  .seg{display:flex;gap:6px;background:var(--frost-2);padding:5px;border-radius:12px;margin:2px 0 16px;}
  .seg button{flex:1;border:none;background:none;padding:10px;border-radius:9px;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;}
  .seg button.on{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm);}
  .mlist{display:flex;flex-direction:column;gap:8px;}
  .mrow{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fff;}
  .mrow .me{font-size:22px;line-height:1;flex:0 0 auto;}
  .mrow .minfo{flex:1;min-width:0;}
  .mrow .mname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mrow .msub{font-size:12.5px;color:var(--muted);}
  .mrow .mbtn{flex:0 0 auto;border:1px solid var(--line);background:#fff;width:40px;height:40px;border-radius:10px;font-size:15px;cursor:pointer;}
  .mrow .mbtn:active{transform:scale(.96);}
  .mrow .mbtn.del{color:#8f2020;background:var(--expired-bg);border-color:#f0b3b3;}
  .epalette{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .epalette .epick{width:40px;height:40px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:20px;cursor:pointer;line-height:1;}
  .epalette .epick.on{border-color:var(--primary);box-shadow:0 0 0 2px rgba(11,92,173,.2);background:var(--primary-soft);}

  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="flake">❄️</span>
      <div>
        <h1>Mon Congélateur</h1>
        <div class="sub">Ce qu'il y a dedans, et jusqu'à quand</div>
      </div>
    </div>
    <div class="summary" id="summary"></div>
  </header>

  <main id="view"></main>
</div>

<nav id="nav">
  <button class="navbtn" data-view="list"><span class="ni">🗂️</span>Produits</button>
  <button class="navbtn" data-view="drawers"><span class="ni">🧊</span>Tiroirs</button>
  <button class="navbtn add" data-view="add"><span class="ni">＋</span>Ajouter</button>
  <button class="navbtn" data-view="manage"><span class="ni">🥕</span>Aliments</button>
  <button class="navbtn" data-view="backup"><span class="ni">⚙️</span>Réglages</button>
</nav>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

const KEY = "congelateur_v1";
const KEY_CATS = "congelateur_cats_v1";
const KEY_PRODUCTS = "congelateur_prods_v1";
const KEY_REV = "congelateur_rev_v1";
const KEY_CODE = "congelateur_code_v1";
const LS_OK = (function(){
  try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }
  catch(e){ return false; }
})();
const mem = {};
function store(k,v){ if(LS_OK){ try{ localStorage.setItem(k,v); return; }catch(e){} } mem[k]=v; }
function read(k){ if(LS_OK){ try{ const r=localStorage.getItem(k); if(r!==null) return r; }catch(e){} } return mem[k]??null; }

  return JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
}
function saveCats(){ store(KEY_CATS, JSON.stringify(CATEGORIES)); touch(); }
function loadProducts(){
  try{ const r=read(KEY_PRODUCTS); if(r){ const a=JSON.parse(r); if(Array.isArray(a)) return a; } }catch(e){}

}

/* Migration douce : ancien congélo "haut" -> "petit" */
function migrateItem(it){
  if(it.freezer==="haut") it.freezer="petit";
  if(!FREEZERS[it.freezer]) it.freezer="grand";
  return it;
}
function loadItems(){
  try{ const r=read(KEY); const a = r ? JSON.parse(r) : []; return Array.isArray(a) ? a.map(migrateItem) : []; }catch(e){ return []; }
}

/* ---------- Synchro cloud (le script Firebase est en bas du fichier) ---------- */
let localRev = Number(read(KEY_REV)) || 0;
let cloudStatus = "local";
let cloudTimer = null;

function touch(){ localRev = Date.now(); store(KEY_REV, String(localRev)); scheduleCloudPush(); }
/* Document cloud = 1 seule chaîne JSON -> évite les limites de types Firestore
   (notamment l'interdiction des tableaux imbriqués comme la liste PRODUCTS). */
function cloudDoc(){
  return {
    payload: JSON.stringify({ items:state.items, categories:CATEGORIES, products:PRODUCTS }),
    updatedAt: localRev,
    appVersion: 3
  };
}
function scheduleCloudPush(){
  if(!window.__cloudSave) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(()=>{ try{ window.__cloudSave(cloudDoc()); }catch(e){} }, 400);
}
window.__cloudSetStatus = function(s){
  cloudStatus = s;
  if(document.getElementById("summary")) renderSummary();
  if(state.view==="backup") renderBackup();
};
window.__cloudNotify = function(msg){ toast(msg); };
window.__cloudPushInitial = function(){
  if(!window.__cloudSave) return;
  if(!localRev){ localRev = Date.now(); store(KEY_REV, String(localRev)); }
  window.__cloudSave(cloudDoc());
};
window.__cloudRemote = function(data){
  if(!data || typeof data!=="object") return;
  const rev = Number(data.updatedAt)||0;
  if(rev < localRev){ scheduleCloudPush(); return; }   // le cloud est en retard : on renvoie notre version
  if(rev === localRev){ return; }                       // écho de notre propre écriture
  let payload = null;
  try{ payload = data.payload ? JSON.parse(data.payload) : data; }catch(e){ return; }
  if(Array.isArray(payload.items)) state.items = payload.items.map(migrateItem);
  if(payload.categories && typeof payload.categories==="object" && Object.keys(payload.categories).length){
    CATEGORIES = payload.categories;
    if(!CATEGORIES.autre) CATEGORIES.autre = {label:"Autre", months:6, icon:"📦"};
  }
  if(Array.isArray(payload.products)) PRODUCTS = payload.products;
  localRev = rev;
  store(KEY, JSON.stringify(state.items));
  store(KEY_CATS, JSON.stringify(CATEGORIES));
  store(KEY_PRODUCTS, JSON.stringify(PRODUCTS));
  store(KEY_REV, String(localRev));
  const busy = (state.view==="add") || (state.view==="manage" && (state.pEdit!==null || state.cEdit!==null));
  if(busy){ if(document.getElementById("summary")) renderSummary(); }
  else { render(); }
};

function todayMid(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function toISO(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function frDate(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function addMonths(iso, months){ const d=parseISO(iso); d.setMonth(d.getMonth()+months); return toISO(d); }
function daysUntil(iso){ return Math.round((parseISO(iso)-todayMid())/86400000); }

function statusOf(item){
  const d = daysUntil(item.expiry);
  if(d < 0)  return {key:"expired", label:"Périmé", icon:"⛔", days:d};
  if(d <= 7) return {key:"urgent",  label:"À manger vite", icon:"⚠️", days:d};
  if(d <= 30)return {key:"soon",    label:"Bientôt", icon:"🕒", days:d};
  return {key:"fresh", label:"OK", icon:"✅", days:d};
}
function statusText(st){
  if(st.days < 0) return `Périmé depuis ${Math.abs(st.days)} j`;
  if(st.days === 0) return "À manger aujourd'hui";
  if(st.days === 1) return "Reste 1 jour";
  return `Reste ${st.days} j`;
}
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

/* normalisation FR : minuscules, sans accents ni ligatures (boeuf = bœuf) */
function normFR(s){
  return String(s).toLowerCase()
    .replace(/œ/g,"oe").replace(/æ/g,"ae")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
/* auto-détection de catégorie à partir du nom saisi */
function guessCategory(name){
  const n = normFR(name.trim());
  if(n.length < 2) return null;
  let best=null, bestLen=Infinity;
  for(const [pname,cat] of PRODUCTS){
    const p = normFR(pname);
    if(p.includes(n) || n.includes(p.split(" ")[0])){
      if(p.length < bestLen){ best=cat; bestLen=p.length; }
    }
  }
  return best;
}

function renderSummary(){
  const n = state.items.length;
  let exp=0, warn=0;
  state.items.forEach(it=>{ const s=statusOf(it).key; if(s==="expired")exp++; else if(s==="urgent"||s==="soon")warn++; });
  let h = `<span class="pill">🗂️ <b>${n}</b> produit${n>1?"s":""}</span>`;
  if(warn) h += `<span class="pill warn">🕒 <b>${warn}</b> à consommer</span>`;
  if(exp)  h += `<span class="pill bad">⛔ <b>${exp}</b> périmé${exp>1?"s":""}</span>`;
  h += syncPill();
  document.getElementById("summary").innerHTML = h;
}
function syncPill(){
  switch(cloudStatus){
    case "online":     return `<span class="pill ok">☁️ Synchronisé</span>`;
    case "offline":    return `<span class="pill warn">☁️ Hors ligne</span>`;
    case "connecting": return `<span class="pill">☁️ Connexion…</span>`;
    case "needcode":   return `<span class="pill warn">☁️ À connecter</span>`;
    default:           return `<span class="pill">💾 Cet appareil</span>`;
  }
}

function filterSortItems(){
  const f = state.filters;
  let items = state.items.slice();
  if(f.search){
    const q=normFR(f.search);
    items = items.filter(it=> normFR(it.name).includes(q) || normFR(CATEGORIES[it.cat]?.label||"").includes(q));
  }
  if(f.freezer!=="all") items = items.filter(it=>it.freezer===f.freezer);
  if(f.status!=="all"){
    items = items.filter(it=>{
      const k=statusOf(it).key;
      if(f.status==="alert") return k==="expired"||k==="urgent"||k==="soon";
      if(f.status==="expired") return k==="expired";
      if(f.status==="fresh") return k==="fresh";
      return true;
    });
  }
  if(state.sort==="expiry") items.sort((a,b)=> a.expiry.localeCompare(b.expiry));
  else if(state.sort==="name") items.sort((a,b)=> a.name.localeCompare(b.name,"fr"));
  else if(state.sort==="added") items.sort((a,b)=> (b.createdAt||"").localeCompare(a.createdAt||""));
  return items;
}

function submitForm(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){ toast("Écris le nom du produit 🙂"); document.getElementById("f-name").focus(); return; }
  const data={
    name,
    cat: document.getElementById("f-cat").value,
    freezer: document.getElementById("f-freezer").value,
    drawer: Number(document.getElementById("f-drawer").value),
    qty: document.getElementById("f-qty").value.trim(),
    freeze: document.getElementById("f-freeze").value || toISO(todayMid()),
    expiry: document.getElementById("f-expiry").value || addMonths(toISO(todayMid()), 6),
    notes: document.getElementById("f-notes").value.trim(),
  };
  if(state.editingId){
    const it=state.items.find(i=>i.id===state.editingId);
    Object.assign(it, data);
    toast("Produit modifié ✓");
  } else {
    data.id = "i"+Date.now()+Math.random().toString(36).slice(2,6);
    data.createdAt = new Date().toISOString();
    state.items.push(data);
    toast(`« ${name} » ajouté ✓`);
  }
  saveItems();
  state.editingId=null;
  go("list");
}
function deleteFromForm(){
  if(!state.editingId) return;
  if(confirm("Supprimer ce produit de la liste ?")){
    state.items = state.items.filter(i=>i.id!==state.editingId);
    saveItems(); state.editingId=null; toast("Produit supprimé"); go("list");
  }
}

/* ---------- Vue TIROIRS ---------- */
function renderDrawers(){
  let html="";
  for(const [fk,fz] of Object.entries(FREEZERS)){
    const inFz = state.items.filter(i=>i.freezer===fk);
    html += `<div class="freezer">
      <div class="fhead">
        <span class="fi">${fz.icon}</span>
        <h3>${fz.label}</h3>
        <span class="fc">${inFz.length} produit${inFz.length>1?"s":""}</span>
      </div>
      <div class="drawers">`;
    for(let d=1; d<=fz.drawers; d++){
      const items = inFz.filter(i=>Number(i.drawer)===d)
        .sort((a,b)=>a.expiry.localeCompare(b.expiry));
      // pastille = pire statut du tiroir
      let worst="fresh";
      const order={fresh:0,soon:1,urgent:2,expired:3};
      items.forEach(i=>{ const k=statusOf(i).key; if(order[k]>order[worst]) worst=k; });
      html += `<div class="drawer">
        <div class="dh">
          ${items.length?`<span class="dot s-${worst}"></span>`:`<span class="dot" style="background:#cdd9e6"></span>`}
          Tiroir ${d}
          <span class="dn">${items.length? items.length+" produit"+(items.length>1?"s":"") : "vide"}</span>
        </div>`;
      if(items.length){
        html += `<div class="ditems">` + items.map(it=>{
          const st=statusOf(it), c=CATEGORIES[it.cat]||CATEGORIES.autre;
          return `<div class="di" onclick="editItem('${it.id}')">
            <span class="dot s-${st.key}"></span>
            <span>${c.icon}</span>
            <span class="dname">${esc(it.name)}${it.qty?` <span style="color:var(--muted);font-weight:500">· ${esc(it.qty)}</span>`:""}</span>
            <span class="ddate">${frDate(it.expiry)}</span>
          </div>`;
        }).join("") + `</div>`;
      } else {
        html += `<div class="vide">Tiroir vide</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  viewEl.innerHTML = html;
}

/* ---------- Vue SAUVEGARDE ---------- */
function hasFirebase(){ const c=window.FIREBASE_CONFIG; return !!(c && c.apiKey && String(c.apiKey).indexOf("COLLE")!==0 && c.projectId); }
function currentCode(){ return (read(KEY_CODE) || window.DEFAULT_HOUSEHOLD_ID || "").trim(); }
function connectCode(){
  let v=(document.getElementById("codeinput").value||"").trim().toLowerCase().replace(/[^a-z0-9\-_]/g,"");
  if(v.length<4){ toast("Choisis un code d'au moins 4 caractères 🙂"); return; }
  store(KEY_CODE, v);
  toast("Connexion en cours…");
  setTimeout(()=>location.reload(), 350);
}
function disconnectCloud(){
  if(!confirm("Déconnecter cet appareil de la synchro ? Les produits restent enregistrés sur l'appareil.")) return;
  store(KEY_CODE, "");
  if(LS_OK){ try{ localStorage.removeItem(KEY_CODE); }catch(e){} }
  setTimeout(()=>location.reload(), 200);
}

  } else {
    const line = cloudStatus==="online"

      : cloudStatus==="offline"
        ? `<span style="color:var(--soon);font-weight:800">● Hors ligne — mise à jour au retour du réseau</span>`
        : `<span style="color:var(--muted);font-weight:800">● Connexion…</span>`;
    sync = `<div class="info">
      <h2>☁️ Synchronisation active</h2>
      <p style="margin-bottom:12px">${line}</p>
      <div class="stat"><span>Code famille</span><b>${esc(code)}</b></div>

    </div>`;

    <h2>💾 Sauvegarde manuelle</h2>
    <p>Pour garder une copie de secours, ou transférer vers un appareil sans synchro. Le fichier contient tout : produits, catégories et aliments.</p>
    <div class="actions">
      <button class="btn primary" onclick="exportData()">⬇️ Exporter dans un fichier</button>
      <button class="btn ghost" onclick="document.getElementById('importfile').click()">⬆️ Importer un fichier</button>

function exportData(){
  const payload = {app:"congelateur", version:2, exportedAt:new Date().toISOString(),
                   items:state.items, categories:CATEGORIES, products:PRODUCTS};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="congelateur-"+toISO(todayMid())+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("Fichier exporté ⬇️");
}
function importData(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const items=Array.isArray(parsed)?parsed:parsed.items;
      if(!Array.isArray(items)) throw new Error("format");
      if(state.items.length && !confirm("Remplacer les données actuelles (produits, catégories et aliments) par le fichier importé ?")) return;
      // Catégories & aliments personnalisés, s'ils sont dans le fichier
      if(parsed.categories && typeof parsed.categories==="object" && Object.keys(parsed.categories).length){
        CATEGORIES = parsed.categories;
        if(!CATEGORIES.autre) CATEGORIES.autre={label:"Autre",months:6,icon:"📦"};
        saveCats();
      }
      if(Array.isArray(parsed.products)){ PRODUCTS = parsed.products; saveProducts(); }
      // Produits rangés au congélateur
      state.items = items.map(it=>migrateItem({
        id: it.id || "i"+Date.now()+Math.random().toString(36).slice(2,6),
        name: it.name||"Produit", cat: CATEGORIES[it.cat]?it.cat:"autre",
        freezer: it.freezer, drawer:Number(it.drawer)||1,
        qty: it.qty||"", freeze: it.freeze||toISO(todayMid()),
        expiry: it.expiry||addMonths(toISO(todayMid()),6), notes: it.notes||"",
        createdAt: it.createdAt||new Date().toISOString(),
      }));
      saveItems();
      toast(`Import réussi : ${state.items.length} produit(s) ✓`);
      go("list");
    }catch(err){ toast("Fichier non valide ❌"); }
  };
  reader.readAsText(file);
}
function wipeAll(){
  if(!state.items.length){ toast("C'est déjà vide 🙂"); return; }
  if(confirm("Effacer TOUS les produits de cet appareil ?")){
    state.items=[]; saveItems(); toast("Tout a été effacé"); go("list");
  }
}

function slug(s){ return normFR(s).replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,24) || "cat"; }
function uniqueKey(base){ let k=base, i=2; while(CATEGORIES[k]){ k=base+"_"+i; i++; } return k; }

function renderManage(){
  if(state.pEdit!==null){ renderProductForm(); return; }
  if(state.cEdit!==null){ renderCatForm(); return; }

  const tab=state.manageTab;
  const seg=`<div class="seg">
    <button class="${tab==='products'?'on':''}" onclick="setManageTab('products')">🥕 Aliments</button>
    <button class="${tab==='cats'?'on':''}" onclick="setManageTab('cats')">🏷️ Catégories</button>
  </div>`;

  let body="";
  if(tab==="products"){
    body = `
      <p class="lead">Ces aliments alimentent les suggestions automatiques (nom, catégorie et date). Ajoute ceux qui manquent chez toi.</p>
      <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="newProduct()">＋ Ajouter un aliment</button>
      <div class="search" style="margin-bottom:12px">
        <span class="mag">🔍</span>
        <input id="msearch" type="text" placeholder="Chercher dans la liste…" value="${esc(state.manageSearch)}"
               oninput="filterProducts(this.value)" autocomplete="off">
        <button class="clr" id="mclr" onclick="clearManageSearch()">✕</button>
      </div>
      <div class="mlist" id="mlist">${productRowsHTML()}</div>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">${PRODUCTS.length} aliments enregistrés</p>`;
  } else {
    const keys=Object.keys(CATEGORIES);
    body = `
      <p class="lead">Une catégorie définit son icône et la durée de conservation proposée par défaut.</p>
      <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="newCat()">＋ Ajouter une catégorie</button>
      <div class="mlist">` +
      keys.map(k=>{
        const c=CATEGORIES[k];
        const used=state.items.filter(i=>i.cat===k).length;
        return `<div class="mrow">
          <span class="me">${c.icon}</span>
          <div class="minfo"><div class="mname">${esc(c.label)}</div>
            <div class="msub">~ ${c.months} mois${used?` · ${used} produit${used>1?"s":""} au congélo`:""}</div></div>
          <button class="mbtn" onclick="editCat('${k}')">✎</button>
          ${k==="autre"
            ? `<button class="mbtn del" style="opacity:.4" onclick="toast('La catégorie « Autre » ne peut pas être supprimée')">🔒</button>`
            : `<button class="mbtn del" onclick="deleteCat('${k}')">🗑</button>`}
        </div>`;
      }).join("") +
      `</div>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">${keys.length} catégories</p>`;
  }

  viewEl.innerHTML = `<div class="panel"><h2>Gérer les aliments</h2>${seg}${body}</div>`;
  const clr=document.getElementById("mclr"); if(clr) clr.style.display=state.manageSearch?"block":"none";
}

function productRowsHTML(){
  const q=normFR(state.manageSearch);
  let rows=PRODUCTS.map((p,idx)=>({p,idx})).filter(o=> !q || normFR(o.p[0]).includes(q));
  rows.sort((a,b)=> a.p[0].localeCompare(b.p[0],"fr"));
  if(!rows.length) return `<div class="empty" style="padding:26px"><p>Aucun aliment ne correspond.</p></div>`;
  return rows.map(o=>{
    const c=CATEGORIES[o.p[1]]||CATEGORIES.autre;
    return `<div class="mrow">
      <span class="me">${c.icon}</span>
      <div class="minfo"><div class="mname">${esc(o.p[0])}</div><div class="msub">${esc(c.label)}</div></div>
      <button class="mbtn" onclick="editProduct(${o.idx})">✎</button>
      <button class="mbtn del" onclick="deleteProduct(${o.idx})">🗑</button>
    </div>`;
  }).join("");
}
function filterProducts(v){
  state.manageSearch=v;
  const cont=document.getElementById("mlist"); if(cont) cont.innerHTML=productRowsHTML();
  const clr=document.getElementById("mclr"); if(clr) clr.style.display=v?"block":"none";
}
function clearManageSearch(){ state.manageSearch=""; renderManage(); const s=document.getElementById("msearch"); if(s) s.focus(); }
function setManageTab(t){ state.manageTab=t; state.manageSearch=""; state.pEdit=null; state.cEdit=null; renderManage(); }

/* --- Formulaire ALIMENT --- */
function newProduct(){ state.pEdit="new"; renderManage(); }
function editProduct(idx){ state.pEdit=idx; renderManage(); }
function renderProductForm(){
  const isNew=state.pEdit==="new";
  const cur=isNew?["","autre"]:PRODUCTS[state.pEdit];
  const catOpts=Object.entries(CATEGORIES).map(([k,c])=>
    `<option value="${k}"${cur[1]===k?" selected":""}>${c.icon} ${c.label}</option>`).join("");
  viewEl.innerHTML=`<div class="panel">
    <h2>${isNew?"Nouvel aliment":"Modifier l'aliment"}</h2>
    <p class="lead">Le nom apparaîtra dans les suggestions, avec la catégorie choisie.</p>
    <div class="field"><label>Nom de l'aliment</label>
      <input id="pf-name" type="text" value="${esc(cur[0])}" placeholder="ex. Poireaux émincés" autocomplete="off"></div>
    <div class="field"><label>Catégorie</label>
      <select id="pf-cat">${catOpts}</select></div>
    <div class="formbtns">
      <button class="btn ghost" onclick="cancelManageForm()">Annuler</button>
      <button class="btn primary" onclick="saveProductForm()">💾 Enregistrer</button>
    </div>
    ${isNew?"":`<div style="margin-top:12px"><button class="btn danger" style="width:100%" onclick="deleteProduct(${state.pEdit}, true)">🗑 Supprimer cet aliment</button></div>`}
  </div>`;
  setTimeout(()=>document.getElementById("pf-name").focus(),50);
}
function saveProductForm(){
  const name=document.getElementById("pf-name").value.trim();
  const cat=document.getElementById("pf-cat").value;
  if(!name){ toast("Donne un nom à l'aliment 🙂"); return; }
  if(state.pEdit==="new") PRODUCTS.push([name,cat]);
  else PRODUCTS[state.pEdit]=[name,cat];
  saveProducts(); state.pEdit=null; toast("Aliment enregistré ✓"); renderManage();
}
function deleteProduct(idx, fromForm){
  if(fromForm && !confirm("Supprimer cet aliment des suggestions ?")) return;
  PRODUCTS.splice(idx,1); saveProducts();
  if(fromForm){ state.pEdit=null; toast("Aliment supprimé"); }
  renderManage();
}

/* --- Formulaire CATÉGORIE --- */
const EMOJI_CHOICES=["🥩","🍖","🥓","🍗","🐟","🐠","🦐","🦀","🥦","🥕","🌽","🫑","🍅","🍄","🧄","🧅","🥔","🍆","🥬","🍓","🍇","🍎","🍋","🍌","🥭","🌿","🍞","🥐","🥧","🍰","🍫","🍦","🍚","🍝","🥫","🥣","🧀","🧈","🥚","☕","🫘","📦"];
function newCat(){ state.cEdit="new"; renderManage(); }
function editCat(key){ state.cEdit=key; renderManage(); }
function renderCatForm(){
  const isNew=state.cEdit==="new";
  const cur=isNew?{label:"",icon:"📦",months:6}:CATEGORIES[state.cEdit];
  const palette=EMOJI_CHOICES.map(e=>`<button type="button" class="epick${cur.icon===e?" on":""}" onclick="pickEmoji('${e}')">${e}</button>`).join("");
  const locked = !isNew && state.cEdit==="autre";
  viewEl.innerHTML=`<div class="panel">
    <h2>${isNew?"Nouvelle catégorie":"Modifier la catégorie"}</h2>
    <div class="field"><label>Nom de la catégorie</label>
      <input id="cf-label" type="text" value="${esc(cur.label)}" placeholder="ex. Gibier" autocomplete="off"></div>
    <div class="field"><label>Icône <span class="hint">choisis ou tape un emoji</span></label>
      <input id="cf-icon" type="text" value="${esc(cur.icon)}" maxlength="2" style="width:84px;text-align:center;font-size:24px">
      <div class="epalette">${palette}</div></div>
    <div class="field"><label>Durée de conservation conseillée <span class="hint">en mois</span></label>
      <input id="cf-months" type="number" min="1" max="60" value="${cur.months}"></div>
    <div class="formbtns">
      <button class="btn ghost" onclick="cancelManageForm()">Annuler</button>
      <button class="btn primary" onclick="saveCatForm()">💾 Enregistrer</button>
    </div>
    ${(isNew||locked)?"":`<div style="margin-top:12px"><button class="btn danger" style="width:100%" onclick="deleteCat('${state.cEdit}', true)">🗑 Supprimer cette catégorie</button></div>`}
  </div>`;
  setTimeout(()=>document.getElementById("cf-label").focus(),50);
}
function pickEmoji(e){
  document.getElementById("cf-icon").value=e;
  document.querySelectorAll(".epick").forEach(b=>b.classList.toggle("on", b.textContent===e));
}
function saveCatForm(){
  const label=document.getElementById("cf-label").value.trim();
  const icon=document.getElementById("cf-icon").value.trim()||"📦";
  let months=parseInt(document.getElementById("cf-months").value,10);
  if(!label){ toast("Donne un nom à la catégorie 🙂"); return; }
  if(!(months>=1)) months=6;
  if(state.cEdit==="new"){ CATEGORIES[uniqueKey(slug(label))]={label,icon,months}; }
  else { CATEGORIES[state.cEdit]={label,icon,months}; }
  saveCats(); state.cEdit=null; toast("Catégorie enregistrée ✓"); renderManage();
}
function deleteCat(key, fromForm){
  if(key==="autre"){ toast("La catégorie « Autre » ne peut pas être supprimée"); return; }
  const usedItems=state.items.filter(i=>i.cat===key).length;
  const usedProds=PRODUCTS.filter(p=>p[1]===key).length;
  let msg="Supprimer cette catégorie ?";
  if(usedItems||usedProds) msg=`Cette catégorie est utilisée par ${usedItems} produit(s) au congélo et ${usedProds} aliment(s). Ils passeront en « Autre ». Continuer ?`;
  if(!confirm(msg)) return;
  state.items.forEach(i=>{ if(i.cat===key) i.cat="autre"; });
  PRODUCTS.forEach(p=>{ if(p[1]===key) p[1]="autre"; });
  delete CATEGORIES[key];
  saveCats(); saveProducts(); saveItems();
  if(fromForm) state.cEdit=null;
  toast("Catégorie supprimée"); renderManage();
}
function cancelManageForm(){ state.pEdit=null; state.cEdit=null; renderManage(); }

/* ============================================================
   ACTIONS
   ============================================================ */
function go(view){ state.view=view; if(view!=="add") state.editingId=null; state.pEdit=null; state.cEdit=null; render(); }
function editItem(id){ state.editingId=id; state.view="add"; render(); }

function removeItem(id){
  const idx=state.items.findIndex(i=>i.id===id);
  if(idx<0) return;
  lastRemoved = {item:state.items[idx], index:idx};
  const name=state.items[idx].name;
  state.items.splice(idx,1);
  saveItems();
  renderSummary();
  if(state.view==="list") renderPList();
  else render();
  toastUndo(`« ${name} » sorti du congélo`);
}
function undoRemove(){
  if(!lastRemoved) return;
  state.items.splice(Math.min(lastRemoved.index, state.items.length), 0, lastRemoved.item);
  saveItems(); lastRemoved=null;
  hideToast();
  render();
  toast("Rétabli ✓");
}

/* ============================================================
   TOAST
   ============================================================ */
const toastEl=document.getElementById("toast");
const toastMsg=document.getElementById("toast-msg");
function toast(msg){
  clearTimeout(toastTimer);
  toastEl.innerHTML=`<span>${esc(msg)}</span>`;
  toastEl.classList.add("show");
  toastTimer=setTimeout(hideToast, 2600);
}
function toastUndo(msg){
  clearTimeout(toastTimer);
  toastEl.innerHTML=`<span>${esc(msg)}</span><button onclick="undoRemove()">Annuler</button>`;
  toastEl.classList.add("show");
  toastTimer=setTimeout(()=>{ hideToast(); lastRemoved=null; }, 5000);
}
function hideToast(){ toastEl.classList.remove("show"); }

<!-- ================================================================
     SYNCHRONISATION FIREBASE (temps réel). Ne rien modifier ici.
     Se connecte seulement si la config Firebase + un code sont présents.
     ================================================================ -->
<script type="module">
  const cfg = window.FIREBASE_CONFIG;
  const HID = window.HOUSEHOLD_ID;
  const hasCfg = !!(cfg && cfg.apiKey && cfg.apiKey.indexOf("COLLE")!==0 && cfg.projectId);
  const set = (s)=> window.__cloudSetStatus && window.__cloudSetStatus(s);

  if(!hasCfg){ set("local"); }
  else if(!HID){ set("needcode"); }
  else {
    set("connecting");
    try{
      const V="12.15.0", B="https://www.gstatic.com/firebasejs/"+V+"/";
      const [{ initializeApp }, { getAuth, signInAnonymously, onAuthStateChanged }, { getFirestore, doc, onSnapshot, setDoc }] =
        await Promise.all([
          import(B+"firebase-app.js"),
          import(B+"firebase-auth.js"),
          import(B+"firebase-firestore.js"),
        ]);
      const app  = initializeApp(cfg);
      const auth = getAuth(app);
      const db   = getFirestore(app);
      const ref  = doc(db, "menages", HID);

      let warnedWrite = false;
      window.__cloudSave = (data)=>{
        setDoc(ref, data).catch(e=>{
          console.warn("cloud save:", e.message);
          if(!warnedWrite){ warnedWrite = true; window.__cloudNotify && window.__cloudNotify("Erreur d'enregistrement cloud : " + e.message); }
        });
      };

      onAuthStateChanged(auth, (user)=>{
        if(!user){ signInAnonymously(auth).catch(e=>{ console.warn("auth:", e.message); set("offline"); }); return; }
        onSnapshot(ref, { includeMetadataChanges:true },
          (snap)=>{
            set(snap.metadata.fromCache ? "offline" : "online");
            if(snap.exists()){ window.__cloudRemote && window.__cloudRemote(snap.data()); }
            else if(!snap.metadata.fromCache){ window.__cloudPushInitial && window.__cloudPushInitial(); }
          },
          (err)=>{ console.warn("cloud snapshot:", err.message); set("offline"); }
        );
      });
    }catch(e){ console.warn("Firebase init:", e.message); set("offline"); }
  }
</script>

const KEY = "congelateur_v1";
const KEY_CATS = "congelateur_cats_v1";
const KEY_PRODUCTS = "congelateur_prods_v1";
const KEY_REV = "congelateur_rev_v1";
const KEY_CODE = "congelateur_code_v1";
const LS_OK = (function(){
  try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }
  catch(e){ return false; }
})();
const mem = {};
function store(k,v){ if(LS_OK){ try{ localStorage.setItem(k,v); return; }catch(e){} } mem[k]=v; }
function read(k){ if(LS_OK){ try{ const r=localStorage.getItem(k); if(r!==null) return r; }catch(e){} } return mem[k]??null; }

  try{ const r=read(KEY_CATS); if(r){ const o=JSON.parse(r); if(o && typeof o==="object" && Object.keys(o).length) return o; } }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
}
function saveCats(){ store(KEY_CATS, JSON.stringify(CATEGORIES)); touch(); }
function loadProducts(){
  try{ const r=read(KEY_PRODUCTS); if(r){ const a=JSON.parse(r); if(Array.isArray(a)) return a; } }catch(e){}

}

/* Migration douce : ancien congélo "haut" -> "petit" */
function migrateItem(it){
  if(it.freezer==="haut") it.freezer="petit";
  if(!FREEZERS[it.freezer]) it.freezer="grand";
  return it;
}
function loadItems(){
  try{ const r=read(KEY); const a = r ? JSON.parse(r) : []; return Array.isArray(a) ? a.map(migrateItem) : []; }catch(e){ return []; }
}

/* ---------- Synchro cloud (le script Firebase est en bas du fichier) ---------- */
let localRev = Number(read(KEY_REV)) || 0;
let cloudStatus = "local";
let cloudTimer = null;

function touch(){ localRev = Date.now(); store(KEY_REV, String(localRev)); scheduleCloudPush(); }
/* Document cloud = 1 seule chaîne JSON -> évite les limites de types Firestore
   (notamment l'interdiction des tableaux imbriqués comme la liste PRODUCTS). */
function cloudDoc(){
  return {
    payload: JSON.stringify({ items:state.items, categories:CATEGORIES, products:PRODUCTS }),
    updatedAt: localRev,
    appVersion: 3
  };
}
function scheduleCloudPush(){
  if(!window.__cloudSave) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(()=>{ try{ window.__cloudSave(cloudDoc()); }catch(e){} }, 400);
}
window.__cloudSetStatus = function(s){
  cloudStatus = s;
  if(document.getElementById("summary")) renderSummary();
  if(state.view==="backup") renderBackup();
};
window.__cloudNotify = function(msg){ toast(msg); };
window.__cloudPushInitial = function(){
  if(!window.__cloudSave) return;
  if(!localRev){ localRev = Date.now(); store(KEY_REV, String(localRev)); }
  window.__cloudSave(cloudDoc());
};
window.__cloudRemote = function(data){
  if(!data || typeof data!=="object") return;
  const rev = Number(data.updatedAt)||0;
  if(rev < localRev){ scheduleCloudPush(); return; }   // le cloud est en retard : on renvoie notre version
  if(rev === localRev){ return; }                       // écho de notre propre écriture
  let payload = null;
  try{ payload = data.payload ? JSON.parse(data.payload) : data; }catch(e){ return; }
  if(Array.isArray(payload.items)) state.items = payload.items.map(migrateItem);
  if(payload.categories && typeof payload.categories==="object" && Object.keys(payload.categories).length){
    CATEGORIES = payload.categories;
    if(!CATEGORIES.autre) CATEGORIES.autre = {label:"Autre", months:6, icon:"📦"};
  }
  if(Array.isArray(payload.products)) PRODUCTS = payload.products;
  localRev = rev;
  store(KEY, JSON.stringify(state.items));
  store(KEY_CATS, JSON.stringify(CATEGORIES));
  store(KEY_PRODUCTS, JSON.stringify(PRODUCTS));
  store(KEY_REV, String(localRev));
  const busy = (state.view==="add") || (state.view==="manage" && (state.pEdit!==null || state.cEdit!==null));
  if(busy){ if(document.getElementById("summary")) renderSummary(); }
  else { render(); }
};

function todayMid(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function toISO(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function frDate(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function addMonths(iso, months){ const d=parseISO(iso); d.setMonth(d.getMonth()+months); return toISO(d); }
function daysUntil(iso){ return Math.round((parseISO(iso)-todayMid())/86400000); }

function statusOf(item){
  const d = daysUntil(item.expiry);
  if(d < 0)  return {key:"expired", label:"Périmé", icon:"⛔", days:d};
  if(d <= 7) return {key:"urgent",  label:"À manger vite", icon:"⚠️", days:d};
  if(d <= 30)return {key:"soon",    label:"Bientôt", icon:"🕒", days:d};
  return {key:"fresh", label:"OK", icon:"✅", days:d};
}
function statusText(st){
  if(st.days < 0) return `Périmé depuis ${Math.abs(st.days)} j`;
  if(st.days === 0) return "À manger aujourd'hui";
  if(st.days === 1) return "Reste 1 jour";
  return `Reste ${st.days} j`;
}
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

/* normalisation FR : minuscules, sans accents ni ligatures (boeuf = bœuf) */
function normFR(s){
  return String(s).toLowerCase()
    .replace(/œ/g,"oe").replace(/æ/g,"ae")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
/* auto-détection de catégorie à partir du nom saisi */
function guessCategory(name){
  const n = normFR(name.trim());
  if(n.length < 2) return null;
  let best=null, bestLen=Infinity;
  for(const [pname,cat] of PRODUCTS){
    const p = normFR(pname);
    if(p.includes(n) || n.includes(p.split(" ")[0])){
      if(p.length < bestLen){ best=cat; bestLen=p.length; }
    }
  }
  return best;
}

function renderSummary(){
  const n = state.items.length;
  let exp=0, warn=0;
  state.items.forEach(it=>{ const s=statusOf(it).key; if(s==="expired")exp++; else if(s==="urgent"||s==="soon")warn++; });
  let h = `<span class="pill">🗂️ <b>${n}</b> produit${n>1?"s":""}</span>`;
  if(warn) h += `<span class="pill warn">🕒 <b>${warn}</b> à consommer</span>`;
  if(exp)  h += `<span class="pill bad">⛔ <b>${exp}</b> périmé${exp>1?"s":""}</span>`;
  h += syncPill();
  document.getElementById("summary").innerHTML = h;
}
function syncPill(){
  switch(cloudStatus){
    case "online":     return `<span class="pill ok">☁️ Synchronisé</span>`;
    case "offline":    return `<span class="pill warn">☁️ Hors ligne</span>`;
    case "connecting": return `<span class="pill">☁️ Connexion…</span>`;
    case "needcode":   return `<span class="pill warn">☁️ À connecter</span>`;
    default:           return `<span class="pill">💾 Cet appareil</span>`;
  }
}

function filterSortItems(){
  const f = state.filters;
  let items = state.items.slice();
  if(f.search){
    const q=normFR(f.search);
    items = items.filter(it=> normFR(it.name).includes(q) || normFR(CATEGORIES[it.cat]?.label||"").includes(q));
  }
  if(f.freezer!=="all") items = items.filter(it=>it.freezer===f.freezer);
  if(f.status!=="all"){
    items = items.filter(it=>{
      const k=statusOf(it).key;
      if(f.status==="alert") return k==="expired"||k==="urgent"||k==="soon";
      if(f.status==="expired") return k==="expired";
      if(f.status==="fresh") return k==="fresh";
      return true;
    });
  }
  if(state.sort==="expiry") items.sort((a,b)=> a.expiry.localeCompare(b.expiry));
  else if(state.sort==="name") items.sort((a,b)=> a.name.localeCompare(b.name,"fr"));
  else if(state.sort==="added") items.sort((a,b)=> (b.createdAt||"").localeCompare(a.createdAt||""));
  return items;
}

  if(editing){
    nameEl.value=editing.name; catEl.value=editing.cat; fzEl.value=editing.freezer;
    qtyEl.value=editing.qty||""; freezeEl.value=editing.freeze; expiryEl.value=editing.expiry;
    notesEl.value=editing.notes||"";
    formState.catManual=true; formState.expiryManual=true;
    populateDrawers(editing.drawer);
  } else {
    catEl.value="autre";
    populateDrawers();
    recalcExpiry();
  }
  updateCatHint();
  setTimeout(()=>nameEl.focus(),50);
}

const formState = {catManual:false, expiryManual:false};

function populateDrawers(sel){
  const fz = FREEZERS[document.getElementById("f-freezer").value];
  const el = document.getElementById("f-drawer");
  let h="";
  for(let i=1;i<=fz.drawers;i++) h+=`<option value="${i}">Tiroir ${i}${i===1?" (en haut)":i===fz.drawers?" (en bas)":""}</option>`;
  el.innerHTML=h;
  if(sel) el.value=sel;
}
function updateCatHint(){
  const cat=CATEGORIES[document.getElementById("f-cat").value];
  document.getElementById("cat-hint").textContent = cat?`· conservation ~ ${cat.months} mois`:"";
}
function recalcExpiry(){
  if(formState.expiryManual) return;
  const cat=document.getElementById("f-cat").value;
  const freeze=document.getElementById("f-freeze").value;
  if(cat && freeze) document.getElementById("f-expiry").value = addMonths(freeze, CATEGORIES[cat].months);
}
function onNameInput(){
  if(formState.catManual) return;
  const g = guessCategory(document.getElementById("f-name").value);
  if(g){ document.getElementById("f-cat").value=g; updateCatHint(); recalcExpiry(); }
}
function onCatChange(){ formState.catManual=true; updateCatHint(); recalcExpiry(); }
function onFreezerChange(){ populateDrawers(); }
function onFreezeChange(){ recalcExpiry(); }
function markExpiryManual(){ formState.expiryManual=true; }

function submitForm(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){ toast("Écris le nom du produit 🙂"); document.getElementById("f-name").focus(); return; }
  const data={
    name,
    cat: document.getElementById("f-cat").value,
    freezer: document.getElementById("f-freezer").value,
    drawer: Number(document.getElementById("f-drawer").value),
    qty: document.getElementById("f-qty").value.trim(),
    freeze: document.getElementById("f-freeze").value || toISO(todayMid()),
    expiry: document.getElementById("f-expiry").value || addMonths(toISO(todayMid()), 6),
    notes: document.getElementById("f-notes").value.trim(),
  };
  if(state.editingId){
    const it=state.items.find(i=>i.id===state.editingId);
    Object.assign(it, data);
    toast("Produit modifié ✓");
  } else {
    data.id = "i"+Date.now()+Math.random().toString(36).slice(2,6);
    data.createdAt = new Date().toISOString();
    state.items.push(data);
    toast(`« ${name} » ajouté ✓`);
  }
  saveItems();
  state.editingId=null;
  go("list");
}
function deleteFromForm(){
  if(!state.editingId) return;
  if(confirm("Supprimer ce produit de la liste ?")){
    state.items = state.items.filter(i=>i.id!==state.editingId);
    saveItems(); state.editingId=null; toast("Produit supprimé"); go("list");
  }
}

/* ---------- Vue TIROIRS ---------- */
function renderDrawers(){
  let html="";
  for(const [fk,fz] of Object.entries(FREEZERS)){
    const inFz = state.items.filter(i=>i.freezer===fk);
    html += `<div class="freezer">
      <div class="fhead">
        <span class="fi">${fz.icon}</span>
        <h3>${fz.label}</h3>
        <span class="fc">${inFz.length} produit${inFz.length>1?"s":""}</span>
      </div>
      <div class="drawers">`;
    for(let d=1; d<=fz.drawers; d++){
      const items = inFz.filter(i=>Number(i.drawer)===d)
        .sort((a,b)=>a.expiry.localeCompare(b.expiry));
      // pastille = pire statut du tiroir
      let worst="fresh";
      const order={fresh:0,soon:1,urgent:2,expired:3};
      items.forEach(i=>{ const k=statusOf(i).key; if(order[k]>order[worst]) worst=k; });
      html += `<div class="drawer">
        <div class="dh">
          ${items.length?`<span class="dot s-${worst}"></span>`:`<span class="dot" style="background:#cdd9e6"></span>`}
          Tiroir ${d}
          <span class="dn">${items.length? items.length+" produit"+(items.length>1?"s":"") : "vide"}</span>
        </div>`;
      if(items.length){
        html += `<div class="ditems">` + items.map(it=>{
          const st=statusOf(it), c=CATEGORIES[it.cat]||CATEGORIES.autre;
          return `<div class="di" onclick="editItem('${it.id}')">
            <span class="dot s-${st.key}"></span>
            <span>${c.icon}</span>
            <span class="dname">${esc(it.name)}${it.qty?` <span style="color:var(--muted);font-weight:500">· ${esc(it.qty)}</span>`:""}</span>
            <span class="ddate">${frDate(it.expiry)}</span>
          </div>`;
        }).join("") + `</div>`;
      } else {
        html += `<div class="vide">Tiroir vide</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  viewEl.innerHTML = html;
}

/* ---------- Vue SAUVEGARDE ---------- */
function hasFirebase(){ const c=window.FIREBASE_CONFIG; return !!(c && c.apiKey && String(c.apiKey).indexOf("COLLE")!==0 && c.projectId); }
function currentCode(){ return (read(KEY_CODE) || window.DEFAULT_HOUSEHOLD_ID || "").trim(); }
function connectCode(){
  let v=(document.getElementById("codeinput").value||"").trim().toLowerCase().replace(/[^a-z0-9\-_]/g,"");
  if(v.length<4){ toast("Choisis un code d'au moins 4 caractères 🙂"); return; }
  store(KEY_CODE, v);
  toast("Connexion en cours…");
  setTimeout(()=>location.reload(), 350);
}
function disconnectCloud(){
  if(!confirm("Déconnecter cet appareil de la synchro ? Les produits restent enregistrés sur l'appareil.")) return;
  store(KEY_CODE, "");
  if(LS_OK){ try{ localStorage.removeItem(KEY_CODE); }catch(e){} }
  setTimeout(()=>location.reload(), 200);
}

  const n=state.items.length;

  // --- Bloc synchronisation ---

    sync = `<div class="info">
      <h2>☁️ Synchronisation</h2>
      <p>La synchro automatique n'est pas encore activée dans ce fichier. Une fois Firebase renseigné (voir la notice fournie), ce panneau permettra de connecter l'appareil. En attendant, tu peux synchroniser à la main avec l'export / import ci-dessous.</p>
    </div>`;
  } else if(!code){
    sync = `<div class="info">
      <h2>☁️ Connecter cet appareil</h2>
      <p>Entre un <b>code famille</b> : invente-le une fois, puis mets exactement le même sur le téléphone et sur l'ordinateur. Les modifications se synchronisent alors toutes seules.</p>
      <div class="field"><label>Code famille</label>
        <input id="codeinput" type="text" placeholder="ex. congelo-martin-7429" autocomplete="off"></div>
      <button class="btn primary" style="width:100%" onclick="connectCode()">☁️ Connecter</button>
      <p style="font-size:12.5px;color:var(--muted);margin-top:12px">Astuce : choisis un code un peu unique (avec des chiffres) — c'est lui qui protège l'accès à ta liste.</p>
    </div>`;
  } else {
    const line = cloudStatus==="online"
        ? `<span style="color:var(--fresh);font-weight:800">● En ligne — tout est synchronisé</span>`
      : cloudStatus==="offline"
        ? `<span style="color:var(--soon);font-weight:800">● Hors ligne — mise à jour au retour du réseau</span>`
        : `<span style="color:var(--muted);font-weight:800">● Connexion…</span>`;
    sync = `<div class="info">
      <h2>☁️ Synchronisation active</h2>
      <p style="margin-bottom:12px">${line}</p>
      <div class="stat"><span>Code famille</span><b>${esc(code)}</b></div>
      <p style="font-size:13px;color:var(--muted);margin:12px 0 14px">Tous les appareils qui utilisent ce même code partagent automatiquement la liste.</p>
      <button class="btn ghost" style="width:100%" onclick="disconnectCloud()">Déconnecter / changer de code</button>
    </div>`;
  }

  viewEl.innerHTML = sync + `
  <div class="info">
    <h2>💾 Sauvegarde manuelle</h2>
    <p>Pour garder une copie de secours, ou transférer vers un appareil sans synchro. Le fichier contient tout : produits, catégories et aliments.</p>
    <div class="actions">
      <button class="btn primary" onclick="exportData()">⬇️ Exporter dans un fichier</button>
      <button class="btn ghost" onclick="document.getElementById('importfile').click()">⬆️ Importer un fichier</button>
      <input id="importfile" type="file" accept=".json,application/json" class="hidden" onchange="importData(this.files[0])">
    </div>
  </div>

  <div class="info">
    <h2>Aperçu</h2>
    <div class="stat"><span>Total de produits</span><b>${n}</b></div>
    ${stats}
  </div>

  <div class="info">
    <h2>Remise à zéro</h2>

    <button class="btn danger" style="width:100%" onclick="wipeAll()">🗑 Tout effacer</button>
  </div>

  <p style="text-align:center;color:var(--muted);font-size:12px;margin:18px 0 4px">

function exportData(){
  const payload = {app:"congelateur", version:2, exportedAt:new Date().toISOString(),
                   items:state.items, categories:CATEGORIES, products:PRODUCTS};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="congelateur-"+toISO(todayMid())+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("Fichier exporté ⬇️");
}
function importData(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const items=Array.isArray(parsed)?parsed:parsed.items;
      if(!Array.isArray(items)) throw new Error("format");
      if(state.items.length && !confirm("Remplacer les données actuelles (produits, catégories et aliments) par le fichier importé ?")) return;
      // Catégories & aliments personnalisés, s'ils sont dans le fichier
      if(parsed.categories && typeof parsed.categories==="object" && Object.keys(parsed.categories).length){
        CATEGORIES = parsed.categories;
        if(!CATEGORIES.autre) CATEGORIES.autre={label:"Autre",months:6,icon:"📦"};
        saveCats();
      }
      if(Array.isArray(parsed.products)){ PRODUCTS = parsed.products; saveProducts(); }
      // Produits rangés au congélateur
      state.items = items.map(it=>migrateItem({
        id: it.id || "i"+Date.now()+Math.random().toString(36).slice(2,6),
        name: it.name||"Produit", cat: CATEGORIES[it.cat]?it.cat:"autre",
        freezer: it.freezer, drawer:Number(it.drawer)||1,
        qty: it.qty||"", freeze: it.freeze||toISO(todayMid()),
        expiry: it.expiry||addMonths(toISO(todayMid()),6), notes: it.notes||"",
        createdAt: it.createdAt||new Date().toISOString(),
      }));
      saveItems();
      toast(`Import réussi : ${state.items.length} produit(s) ✓`);
      go("list");
    }catch(err){ toast("Fichier non valide ❌"); }
  };
  reader.readAsText(file);
}
function wipeAll(){
  if(!state.items.length){ toast("C'est déjà vide 🙂"); return; }
  if(confirm("Effacer TOUS les produits de cet appareil ?")){
    state.items=[]; saveItems(); toast("Tout a été effacé"); go("list");
  }
}

   VUE ALIMENTS : gérer produits (suggestions) + catégories

function slug(s){ return normFR(s).replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,24) || "cat"; }
function uniqueKey(base){ let k=base, i=2; while(CATEGORIES[k]){ k=base+"_"+i; i++; } return k; }

function renderManage(){
  if(state.pEdit!==null){ renderProductForm(); return; }
  if(state.cEdit!==null){ renderCatForm(); return; }

  const tab=state.manageTab;
  const seg=`<div class="seg">
    <button class="${tab==='products'?'on':''}" onclick="setManageTab('products')">🥕 Aliments</button>
    <button class="${tab==='cats'?'on':''}" onclick="setManageTab('cats')">🏷️ Catégories</button>
  </div>`;

  let body="";
  if(tab==="products"){
    body = `
      <p class="lead">Ces aliments alimentent les suggestions automatiques (nom, catégorie et date). Ajoute ceux qui manquent chez toi.</p>
      <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="newProduct()">＋ Ajouter un aliment</button>
      <div class="search" style="margin-bottom:12px">
        <span class="mag">🔍</span>
        <input id="msearch" type="text" placeholder="Chercher dans la liste…" value="${esc(state.manageSearch)}"
               oninput="filterProducts(this.value)" autocomplete="off">
        <button class="clr" id="mclr" onclick="clearManageSearch()">✕</button>
      </div>
      <div class="mlist" id="mlist">${productRowsHTML()}</div>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">${PRODUCTS.length} aliments enregistrés</p>`;
  } else {
    const keys=Object.keys(CATEGORIES);
    body = `
      <p class="lead">Une catégorie définit son icône et la durée de conservation proposée par défaut.</p>
      <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="newCat()">＋ Ajouter une catégorie</button>
      <div class="mlist">` +
      keys.map(k=>{
        const c=CATEGORIES[k];
        const used=state.items.filter(i=>i.cat===k).length;
        return `<div class="mrow">
          <span class="me">${c.icon}</span>
          <div class="minfo"><div class="mname">${esc(c.label)}</div>
            <div class="msub">~ ${c.months} mois${used?` · ${used} produit${used>1?"s":""} au congélo`:""}</div></div>
          <button class="mbtn" onclick="editCat('${k}')">✎</button>
          ${k==="autre"
            ? `<button class="mbtn del" style="opacity:.4" onclick="toast('La catégorie « Autre » ne peut pas être supprimée')">🔒</button>`
            : `<button class="mbtn del" onclick="deleteCat('${k}')">🗑</button>`}
        </div>`;
      }).join("") +
      `</div>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">${keys.length} catégories</p>`;
  }

  viewEl.innerHTML = `<div class="panel"><h2>Gérer les aliments</h2>${seg}${body}</div>`;
  const clr=document.getElementById("mclr"); if(clr) clr.style.display=state.manageSearch?"block":"none";
}

function productRowsHTML(){
  const q=normFR(state.manageSearch);
  let rows=PRODUCTS.map((p,idx)=>({p,idx})).filter(o=> !q || normFR(o.p[0]).includes(q));
  rows.sort((a,b)=> a.p[0].localeCompare(b.p[0],"fr"));
  if(!rows.length) return `<div class="empty" style="padding:26px"><p>Aucun aliment ne correspond.</p></div>`;
  return rows.map(o=>{
    const c=CATEGORIES[o.p[1]]||CATEGORIES.autre;
    return `<div class="mrow">
      <span class="me">${c.icon}</span>
      <div class="minfo"><div class="mname">${esc(o.p[0])}</div><div class="msub">${esc(c.label)}</div></div>
      <button class="mbtn" onclick="editProduct(${o.idx})">✎</button>
      <button class="mbtn del" onclick="deleteProduct(${o.idx})">🗑</button>
    </div>`;
  }).join("");
}
function filterProducts(v){
  state.manageSearch=v;
  const cont=document.getElementById("mlist"); if(cont) cont.innerHTML=productRowsHTML();
  const clr=document.getElementById("mclr"); if(clr) clr.style.display=v?"block":"none";
}
function clearManageSearch(){ state.manageSearch=""; renderManage(); const s=document.getElementById("msearch"); if(s) s.focus(); }
function setManageTab(t){ state.manageTab=t; state.manageSearch=""; state.pEdit=null; state.cEdit=null; renderManage(); }

/* --- Formulaire ALIMENT --- */
function newProduct(){ state.pEdit="new"; renderManage(); }
function editProduct(idx){ state.pEdit=idx; renderManage(); }
function renderProductForm(){
  const isNew=state.pEdit==="new";
  const cur=isNew?["","autre"]:PRODUCTS[state.pEdit];

    <div class="field"><label>Nom de l'aliment</label>
      <input id="pf-name" type="text" value="${esc(cur[0])}" placeholder="ex. Poireaux émincés" autocomplete="off"></div>
    <div class="field"><label>Catégorie</label>
      <select id="pf-cat">${catOpts}</select></div>
    <div class="formbtns">
      <button class="btn ghost" onclick="cancelManageForm()">Annuler</button>
      <button class="btn primary" onclick="saveProductForm()">💾 Enregistrer</button>
    </div>
    ${isNew?"":`<div style="margin-top:12px"><button class="btn danger" style="width:100%" onclick="deleteProduct(${state.pEdit}, true)">🗑 Supprimer cet aliment</button></div>`}

function saveProductForm(){
  const name=document.getElementById("pf-name").value.trim();
  const cat=document.getElementById("pf-cat").value;

function deleteProduct(idx, fromForm){

/* --- Formulaire CATÉGORIE --- */
const EMOJI_CHOICES=["🥩","🍖","🥓","🍗","🐟","🐠","🦐","🦀","🥦","🥕","🌽","🫑","🍅","🍄","🧄","🧅","🥔","🍆","🥬","🍓","🍇","🍎","🍋","🍌","🥭","🌿","🍞","🥐","🥧","🍰","🍫","🍦","🍚","🍝","🥫","🥣","🧀","🧈","🥚","☕","🫘","📦"];
function newCat(){ state.cEdit="new"; renderManage(); }
function editCat(key){ state.cEdit=key; renderManage(); }
function renderCatForm(){
  const isNew=state.cEdit==="new";
  const cur=isNew?{label:"",icon:"📦",months:6}:CATEGORIES[state.cEdit];
  const palette=EMOJI_CHOICES.map(e=>`<button type="button" class="epick${cur.icon===e?" on":""}" onclick="pickEmoji('${e}')">${e}</button>`).join("");
  const locked = !isNew && state.cEdit==="autre";
  viewEl.innerHTML=`<div class="panel">
    <h2>${isNew?"Nouvelle catégorie":"Modifier la catégorie"}</h2>
    <div class="field"><label>Nom de la catégorie</label>
      <input id="cf-label" type="text" value="${esc(cur.label)}" placeholder="ex. Gibier" autocomplete="off"></div>
    <div class="field"><label>Icône <span class="hint">choisis ou tape un emoji</span></label>
      <input id="cf-icon" type="text" value="${esc(cur.icon)}" maxlength="2" style="width:84px;text-align:center;font-size:24px">
      <div class="epalette">${palette}</div></div>
    <div class="field"><label>Durée de conservation conseillée <span class="hint">en mois</span></label>
      <input id="cf-months" type="number" min="1" max="60" value="${cur.months}"></div>
    <div class="formbtns">
      <button class="btn ghost" onclick="cancelManageForm()">Annuler</button>
      <button class="btn primary" onclick="saveCatForm()">💾 Enregistrer</button>
    </div>
    ${(isNew||locked)?"":`<div style="margin-top:12px"><button class="btn danger" style="width:100%" onclick="deleteCat('${state.cEdit}', true)">🗑 Supprimer cette catégorie</button></div>`}
  </div>`;
  setTimeout(()=>document.getElementById("cf-label").focus(),50);
}
function pickEmoji(e){
  document.getElementById("cf-icon").value=e;
  document.querySelectorAll(".epick").forEach(b=>b.classList.toggle("on", b.textContent===e));
}
function saveCatForm(){
  const label=document.getElementById("cf-label").value.trim();
  const icon=document.getElementById("cf-icon").value.trim()||"📦";
  let months=parseInt(document.getElementById("cf-months").value,10);
  if(!label){ toast("Donne un nom à la catégorie 🙂"); return; }
  if(!(months>=1)) months=6;
  if(state.cEdit==="new"){ CATEGORIES[uniqueKey(slug(label))]={label,icon,months}; }
  else { CATEGORIES[state.cEdit]={label,icon,months}; }
  saveCats(); state.cEdit=null; toast("Catégorie enregistrée ✓"); renderManage();
}
function deleteCat(key, fromForm){
  if(key==="autre"){ toast("La catégorie « Autre » ne peut pas être supprimée"); return; }
  const usedItems=state.items.filter(i=>i.cat===key).length;
  const usedProds=PRODUCTS.filter(p=>p[1]===key).length;
  let msg="Supprimer cette catégorie ?";
  if(usedItems||usedProds) msg=`Cette catégorie est utilisée par ${usedItems} produit(s) au congélo et ${usedProds} aliment(s). Ils passeront en « Autre ». Continuer ?`;
  if(!confirm(msg)) return;
  state.items.forEach(i=>{ if(i.cat===key) i.cat="autre"; });
  PRODUCTS.forEach(p=>{ if(p[1]===key) p[1]="autre"; });
  delete CATEGORIES[key];
  saveCats(); saveProducts(); saveItems();
  if(fromForm) state.cEdit=null;
  toast("Catégorie supprimée"); renderManage();
}
function cancelManageForm(){ state.pEdit=null; state.cEdit=null; renderManage(); }

   ============================================================ */
function go(view){ state.view=view; if(view!=="add") state.editingId=null; state.pEdit=null; state.cEdit=null; render(); }
function editItem(id){ state.editingId=id; state.view="add"; render(); }

function removeItem(id){
  const idx=state.items.findIndex(i=>i.id===id);
  if(idx<0) return;
  lastRemoved = {item:state.items[idx], index:idx};
  const name=state.items[idx].name;
  state.items.splice(idx,1);
  saveItems();
  renderSummary();
  if(state.view==="list") renderPList();
  else render();
  toastUndo(`« ${name} » sorti du congélo`);
}
function undoRemove(){
  if(!lastRemoved) return;
  state.items.splice(Math.min(lastRemoved.index, state.items.length), 0, lastRemoved.item);
  saveItems(); lastRemoved=null;
  hideToast();
  render();
  toast("Rétabli ✓");
}

/* filtres */
function onSearch(v){
  state.filters.search=v;
  document.getElementById("clrbtn").style.display = v?"block":"none";
  renderPList();
}
function clearSearch(){ state.filters.search=""; renderList(); document.getElementById("search").focus(); }
function setStatusFilter(v){ state.filters.status=v; if(state.view!=="list"){state.view="list";} render(); }
function setFreezerFilter(v){ state.filters.freezer=v; renderList(); }
function setSort(v){ state.sort=v; renderPList(); }

/* ============================================================
   TOAST
   ============================================================ */
const toastEl=document.getElementById("toast");
const toastMsg=document.getElementById("toast-msg");
function toast(msg){
  clearTimeout(toastTimer);
  toastEl.innerHTML=`<span>${esc(msg)}</span>`;
  toastEl.classList.add("show");
  toastTimer=setTimeout(hideToast, 2600);
}
function toastUndo(msg){
  clearTimeout(toastTimer);
  toastEl.innerHTML=`<span>${esc(msg)}</span><button onclick="undoRemove()">Annuler</button>`;
  toastEl.classList.add("show");
  toastTimer=setTimeout(()=>{ hideToast(); lastRemoved=null; }, 5000);
}
function hideToast(){ toastEl.classList.remove("show"); }

/* ============================================================
   NAV + INIT
   ============================================================ */
document.getElementById("nav").addEventListener("click", e=>{
  const b=e.target.closest(".navbtn"); if(!b) return;
  go(b.dataset.view);
});

render();
</script>

<!-- ================================================================
     SYNCHRONISATION FIREBASE (temps réel). Ne rien modifier ici.
     Se connecte seulement si la config Firebase + un code sont présents.
     ================================================================ -->
<script type="module">
  const cfg = window.FIREBASE_CONFIG;
  const HID = window.HOUSEHOLD_ID;
  const hasCfg = !!(cfg && cfg.apiKey && cfg.apiKey.indexOf("COLLE")!==0 && cfg.projectId);
  const set = (s)=> window.__cloudSetStatus && window.__cloudSetStatus(s);

  if(!hasCfg){ set("local"); }
  else if(!HID){ set("needcode"); }
  else {
    set("connecting");
    try{
      const V="12.15.0", B="https://www.gstatic.com/firebasejs/"+V+"/";
      const [{ initializeApp }, { getAuth, signInAnonymously, onAuthStateChanged }, { getFirestore, doc, onSnapshot, setDoc }] =
        await Promise.all([
          import(B+"firebase-app.js"),
          import(B+"firebase-auth.js"),
          import(B+"firebase-firestore.js"),
        ]);
      const app  = initializeApp(cfg);
      const auth = getAuth(app);
      const db   = getFirestore(app);
      const ref  = doc(db, "menages", HID);

      let warnedWrite = false;
      window.__cloudSave = (data)=>{
        setDoc(ref, data).catch(e=>{
          console.warn("cloud save:", e.message);
          if(!warnedWrite){ warnedWrite = true; window.__cloudNotify && window.__cloudNotify("Erreur d'enregistrement cloud : " + e.message); }
        });
      };

      onAuthStateChanged(auth, (user)=>{
        if(!user){ signInAnonymously(auth).catch(e=>{ console.warn("auth:", e.message); set("offline"); }); return; }
        onSnapshot(ref, { includeMetadataChanges:true },
          (snap)=>{
            set(snap.metadata.fromCache ? "offline" : "online");
            if(snap.exists()){ window.__cloudRemote && window.__cloudRemote(snap.data()); }
            else if(!snap.metadata.fromCache){ window.__cloudPushInitial && window.__cloudPushInitial(); }
          },
          (err)=>{ console.warn("cloud snapshot:", err.message); set("offline"); }
        );
      });
    }catch(e){ console.warn("Firebase init:", e.message); set("offline"); }
  }
</script>
